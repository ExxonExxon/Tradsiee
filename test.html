<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | Tradsiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --blue: #007AFF;
            --text: #1C1C1E;
            --muted: #8E8E93;
            --border: rgba(0,0,0,0.07);
            --red: #FF3B30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient Orbs ── */
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.7; pointer-events: none; z-index: 0; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%); top: -150px; right: -100px; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(52,199,89,0.08) 0%, transparent 70%); bottom: -100px; left: -80px; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,59,48,0.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 0; pointer-events: none;
        }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; }

        .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-mark { width: 44px; height: 44px; background: #000; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 22px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); position: relative; overflow: hidden; }
        .logo-mark::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: rgba(255,255,255,0.08); border-radius: 14px 14px 0 0; }
        .logo-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }

        .card { background: var(--card); border-radius: 32px; border: 1px solid var(--border); box-shadow: 0 2px 0 rgba(255,255,255,0.8) inset, 0 20px 60px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04); padding: 40px; }

        .heading { margin-bottom: 32px; }
        .heading h2 { font-size: 30px; font-weight: 900; letter-spacing: -0.8px; line-height: 1.1; color: var(--text); }
        .heading p { font-size: 14px; font-weight: 500; color: var(--muted); margin-top: 6px; }

        .field { position: relative; margin-bottom: 20px; }
        .field label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 7px; }
        .field input { width: 100%; padding: 15px 18px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); outline: none; transition: all 0.25s; }
        .field input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        .btn-primary { width: 100%; padding: 16px; border-radius: 18px; border: none; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary:hover { background: #1C1C1E; transform: translateY(-1px); }

        #loader { display: none; position: fixed; inset: 0; background: rgba(242,242,247,0.85); backdrop-filter: blur(12px); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .l-ring { width: 40px; height: 40px; border: 3px solid rgba(0,0,0,0.08); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="l-ring"></div>
        <span>Updating…</span>
    </div>

    <div class="container">
        <div class="logo-wrap">
            <div class="logo-mark">B</div>
            <span class="logo-name">Tradsiee</span>
        </div>

        <div class="card">
            <div class="heading">
                <h2>New password.</h2>
                <p>Choose a secure new password for your account.</p>
            </div>

            <div class="field">
                <label>New Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
            </div>

            <button class="btn-primary" onclick="updatePassword()" id="update-btn">
                <span>Update Password</span>
            </button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin.includes('127.0.0.1') || window.location.origin.includes('localhost')
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        async function updatePassword() {
            const pwd = document.getElementById('password').value;
            if (pwd.length < 8) return alert("Password must be at least 8 characters.");

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const res = await fetch(`${API_BASE}/update-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${new URLSearchParams(window.location.hash.substring(1)).get('access_token')}` },
                    body: JSON.stringify({ new_password: pwd })
                });

                if (res.ok) {
                    alert("Password updated successfully!");
                    window.location.href = "[[PATH_LOGIN]]";
                } else {
                    loader.style.display = 'none';
                    alert("Failed to update password.");
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Connection error.");
            }
        }
    </script>
</body>
</html>
