<!-- 
[AUTHENTICATION_SYSTEM_SPECIFICATION]
This file serves as the primary identity verification entry point for the Tradsiee platform.
It is architected as a lightweight Single Page Application (SPA) within a single template, 
orchestrating login, password recovery, and session establishment.

[ARCHITECTURAL_WORKFLOW]
1. SPA Interaction Model: Employs CSS-driven view switching ('login', 'forgot', 'sent') 
   to maintain a zero-refresh user experience.
2. State Management: Directly manipulates DOM state and local variables to manage 
   transactional feedback (loaders, spinners, errors).
3. Persistence Strategy: On successful authentication, sensitive session identifiers 
   (JWT token, business slug) are committed to LocalStorage for cross-page persistence.
4. UI Reactive System: Implements a custom 'Toast' notification layer for real-time 
   asynchronous feedback.

[SECURITY_ORCHESTRATION]
- Credential Collection: Captures and transmits identity metadata via secure JSON payloads.
- Identity Isolation: Ensures session state is scoped to the specific business slug returned 
  by the FastAPI backend.
- High-Friction MFA Hooks: (Planned) Integration with SMS-based verification layers.

[DATA_BINDING_DETAILS]
- Inbound: User credentials (Email/Password) mapped from DOM to registration payloads.
- Outbound: Authentication tokens and workspace identifiers synchronized with the Supabase backend.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Tradsiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* [DESIGN_SYSTEM_TOKEN_DEFINITION] */
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --blue: #007AFF;
            --blue-light: rgba(0,122,255,0.08);
            --text: #1C1C1E;
            --muted: #8E8E93;
            --border: rgba(0,0,0,0.07);
            --red: #FF3B30;
            --green: #34C759;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* [VISUAL_ORCHESTRATION: AMBIENT_ORBS] */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: orbFloat 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%); top: -150px; right: -100px; animation-delay: 0.1s; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(52,199,89,0.08) 0%, transparent 70%); bottom: -100px; left: -80px; animation-delay: 0.3s; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,59,48,0.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0.5s; }
        @keyframes orbFloat { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        /* [UI_COMPONENT: BRAND_ANCHOR] */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(-12px);
            animation: slideDown 0.6s cubic-bezier(0.2,0,0,1) 0.1s forwards;
        }
        .logo-mark {
            width: 44px; height: 44px; background: #000; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            position: relative; overflow: hidden;
        }
        .logo-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }

        /* [UI_COMPONENT: AUTH_CARD] */
        .card {
            background: var(--card); border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 2px 0 rgba(255,255,255,0.8) inset, 0 20px 60px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
            padding: 40px; opacity: 0; transform: translateY(16px) scale(0.98);
            animation: cardRise 0.7s cubic-bezier(0.2,0,0,1) 0.25s forwards;
        }

        @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
        @keyframes cardRise { to { opacity: 1; transform: translateY(0) scale(1); } }

        .view { display: none; }
        .view.active { display: block; }

        .heading { margin-bottom: 32px; }
        .heading h2 { font-size: 30px; font-weight: 900; letter-spacing: -0.8px; line-height: 1.1; color: var(--text); }
        .heading p { font-size: 14px; font-weight: 500; color: var(--muted); margin-top: 6px; }

        /* [UI_COMPONENT: INPUT_FIELDS] */
        .field { position: relative; margin-bottom: 12px; }
        .field label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 7px; }
        .field input {
            width: 100%; padding: 15px 18px; border-radius: 16px; border: 1.5px solid var(--border);
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px;
            font-weight: 600; color: var(--text); outline: none; transition: all 0.25s cubic-bezier(0.2,0,0,1);
        }
        .field input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); transform: translateY(-1px); }
        .field input.error { border-color: var(--red); box-shadow: 0 0 0 4px rgba(255,59,48,0.1); }

        /* [UI_COMPONENT: PRIMARY_BUTTONS] */
        .btn-primary {
            width: 100%; padding: 16px; border-radius: 18px; border: none; background: #000; color: #fff;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
            margin-top: 8px; position: relative; overflow: hidden;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary:hover { background: #1C1C1E; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* [UI_COMPONENT: ASYNC_LOADER] */
        #loader {
            display: none; position: fixed; inset: 0; background: rgba(242,242,247,0.85); backdrop-filter: blur(12px);
            z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
        }

        /* [UI_COMPONENT: NOTIFICATION_SYSTEM] */
        #toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 20px; background: #1C1C1E; color: #fff; font-size: 13px; font-weight: 600; box-shadow: 0 16px 48px rgba(0,0,0,0.2); pointer-events: auto; max-width: 340px; white-space: normal; animation: toastIn 0.4s cubic-bezier(0.2,0,0,1) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="loader">
        <div style="width:40px;height:40px;border:3px solid rgba(0,0,0,0.08);border-top-color:#000;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <span>Signing in…</span>
    </div>

    <div id="toast-container"></div>

    <div class="container">
        <div class="logo-wrap">
            <div class="logo-mark">B</div>
            <span class="logo-name">Tradsiee</span>
        </div>

        <div class="card">
            <!-- [VIEW: LOGIN_INTERFACE] -->
            <div id="login-view" class="view active">
                <div class="heading">
                    <h2>Welcome back.</h2>
                    <p>Good to see you again.</p>
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                    <div style="display:flex;justify-content:flex-end;margin-top:6px;">
                        <button style="font-size:12px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;" onclick="switchTo('forgot')">Forgot password?</button>
                    </div>
                </div>

                <button class="btn-primary" onclick="login()" id="login-btn">
                    <span>Sign In</span>
                    <div class="spinner" id="login-spinner"></div>
                </button>
            </div>

            <!-- [VIEW: RECOVERY_INTERFACE] -->
            <div id="forgot-view" class="view">
                <button style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;margin-bottom:20px;cursor:pointer;" onclick="switchTo('login')">Back</button>
                <div class="heading">
                    <h2>Reset password.</h2>
                    <p>We'll send a reset link to your email.</p>
                </div>
                <div class="field">
                    <label>Email address</label>
                    <input type="email" id="reset-email" placeholder="you@example.com">
                </div>
                <button class="btn-primary" onclick="handleReset()" id="reset-btn">
                    <span>Send Reset Link</span>
                    <div class="spinner" id="reset-spinner"></div>
                </button>
            </div>

            <!-- [VIEW: SUCCESS_FEEDBACK] -->
            <div id="sent-view" class="view">
                <div style="text-align:center; padding: 20px 0;">
                    <h2 style="font-size:22px;font-weight:900;margin-bottom:8px;">Check your inbox.</h2>
                    <p style="font-size:14px;color:var(--muted);">We've sent a password reset link.</p>
                </div>
                <button style="width:100%;padding:14px;background:none;border:1.5px solid var(--border);border-radius:18px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;" onclick="switchTo('login')">Back to Sign In</button>
            </div>
        </div>

        <p style="text-align:center;margin-top:28px;font-size:13px;color:var(--muted);">New to Tradsiee? <a href="[[PATH_SIGNUP]]" style="color:var(--blue);font-weight:700;text-decoration:none;">Create an account</a></p>
    </div>

    <script src="/config.js"></script>
    <script>
        /* [SCRIPT_SPECIFICATION]
           Manages logical view transitions and backend API orchestration for the authentication suite.
        */
        const API_BASE = TRADSIEE_ENV.API_BASE;

        function toast(m, type = 'error') {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `<span>${m}</span>`;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => { el.remove(); }, 4000);
        }

        function switchTo(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${view}-view`).classList.add('active');
        }

        /* [API_ORCHESTRATION: CREDENTIAL_AUTHENTICATION] */
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            if (!email || !password) { toast('Email and password required'); return; }

            document.getElementById('loader').style.display = 'flex';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                // [UNVERIFIED_STATE_HANDLING]
                // Allow login even if email isn't confirmed; the Portal will show the banner.
                if (res.ok || res.status === 403) {
                    localStorage.setItem('tradsiee_slug', data.slug);
                    localStorage.setItem('tradsiee_token', data.access_token);
                    setTimeout(() => { window.location.href = '[[PATH_PORTAL]]'; }, 500);
                } else {
                    toast(data.detail || 'Login failed');
                    document.getElementById('loader').style.display = 'none';
                    btn.disabled = false;
                }
            } catch (err) {
                toast('Connection error');
                document.getElementById('loader').style.display = 'none';
                btn.disabled = false;
            }
        }

        /* [API_ORCHESTRATION: PASSWORD_RECOVERY] */
        async function handleReset() {
            const email = document.getElementById('reset-email').value.trim();
            if (!email) { toast('Email address required'); return; }
            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (res.ok) switchTo('sent');
                else toast('Could not send reset link');
            } catch { toast('Connection error'); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
        }
    </script>
</body>
</html>
