<!-- 
AI_INFO: This file serves as the primary authentication entry point for the Tradsiee platform.
ARCHITECTURAL_INTENT: 
1. Single Page Application (SPA) behavior within a single HTML file using CSS-based view switching.
2. State management is handled via DOM manipulation and local variable tracking.
3. Authentication state is persisted in localStorage (tradsiee_token, tradsiee_slug) upon successful login.
4. UI/UX focuses on high-fidelity feedback using a custom Toast system and full-screen loaders.
SECURITY_POSTURE: 
- Implements credential-based authentication.
- Uses HTTPS (assumed via API_BASE) for data transmission.
- Token-based session management following the login event.
DATA_BINDING:
- Manual binding from input values to JSON payloads in fetch calls.
- One-way binding from API responses to UI state (errors, redirects, view changes).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Tradsiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --blue: #007AFF;
            --blue-light: rgba(0,122,255,0.08);
            --text: #1C1C1E;
            --muted: #8E8E93;
            --border: rgba(0,0,0,0.07);
            --red: #FF3B30;
            --green: #34C759;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient Background Orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: orbFloat 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%);
            top: -150px; right: -100px;
            animation-delay: 0.1s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(52,199,89,0.08) 0%, transparent 70%);
            bottom: -100px; left: -80px;
            animation-delay: 0.3s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,59,48,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 0.5s;
        }
        @keyframes orbFloat {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* ── Grid Texture ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Main Container ── */
        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        /* ── Logo ── */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(-12px);
            animation: slideDown 0.6s cubic-bezier(0.2,0,0,1) 0.1s forwards;
        }
        .logo-mark {
            width: 44px; height: 44px;
            background: #000;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        .logo-mark::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: rgba(255,255,255,0.08);
            border-radius: 14px 14px 0 0;
        }
        .logo-name {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        /* ── Card ── */
        .card {
            background: var(--card);
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 
                0 2px 0 rgba(255,255,255,0.8) inset,
                0 20px 60px rgba(0,0,0,0.06),
                0 4px 16px rgba(0,0,0,0.04);
            padding: 40px;
            opacity: 0;
            transform: translateY(16px) scale(0.98);
            animation: cardRise 0.7s cubic-bezier(0.2,0,0,1) 0.25s forwards;
        }

        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardRise {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── View panels ── */
        .view { display: none; }
        .view.active { display: block; }

        /* ── Heading ── */
        .heading {
            margin-bottom: 32px;
        }
        .heading h2 {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.8px;
            line-height: 1.1;
            color: var(--text);
        }
        .heading p {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ── Form Fields ── */
        .field { position: relative; margin-bottom: 12px; }

        .field label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .field input {
            width: 100%;
            padding: 15px 18px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
            -webkit-appearance: none;
        }
        .field input::placeholder { color: #C7C7CC; font-weight: 500; }
        .field input:focus {
            border-color: var(--blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
            transform: translateY(-1px);
        }
        .field input.error {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(255,59,48,0.1);
        }

        /* ── Forgot Link ── */
        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
            margin-bottom: 4px;
        }
        .forgot-link {
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            cursor: pointer;
            background: none; border: none;
            padding: 4px 0;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.7; }

        /* ── Primary Button ── */
        .btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }
        .btn-primary:hover {
            background: #1C1C1E;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .btn-primary:active { transform: scale(0.98); box-shadow: none; }
        .btn-primary:disabled { background: #C7C7CC; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ── Ghost Button ── */
        .btn-ghost {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }

        /* ── Spinner ── */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer signup prompt ── */
        .footer-link {
            text-align: center;
            margin-top: 28px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            opacity: 0;
            animation: fadeUp 0.6s ease 0.6s forwards;
        }
        .footer-link a { color: var(--blue); font-weight: 700; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── View Transition ── */
        .view-enter {
            animation: viewIn 0.4s cubic-bezier(0.2,0,0,1) forwards;
        }
        .view-exit {
            animation: viewOut 0.25s cubic-bezier(0.4,0,1,1) forwards;
        }
        @keyframes viewIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes viewOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(-20px); }
        }

        /* ── Full-screen Loader ── */
        #loader {
            display: none;
            position: fixed; inset: 0;
            background: rgba(242,242,247,0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center; justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #loader .l-ring {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,0,0,0.08);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loader span {
            font-size: 12px; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        /* ── Toast System ── */
        #toast-container {
            position: fixed;
            bottom: 32px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 20px;
            background: #1C1C1E;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
            pointer-events: auto;
            white-space: nowrap;
            max-width: 340px;
            white-space: normal;
            animation: toastIn 0.4s cubic-bezier(0.2,0,0,1) forwards;
        }
        .toast.toast-exit {
            animation: toastOut 0.35s cubic-bezier(0.4,0,1,1) forwards;
        }
        .toast-icon {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 13px;
        }
        .toast-error .toast-icon  { background: rgba(255,59,48,0.25); color: #FF3B30; }
        .toast-success .toast-icon { background: rgba(52,199,89,0.25); color: #34C759; }
        .toast-info .toast-icon    { background: rgba(0,122,255,0.25); color: #007AFF; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(16px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to   { opacity: 0; transform: translateY(8px) scale(0.95); }
        }

        /* ── Success checkmark animation ── */
        .check-circle {
            width: 56px; height: 56px;
            background: rgba(52,199,89,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .check-circle svg { color: var(--green); }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--border);
        }
        .divider span {
            font-size: 11px; font-weight: 700;
            color: #C7C7CC; text-transform: uppercase; letter-spacing: 0.08em;
        }

        /* ── Back arrow ── */
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 700;
            color: var(--muted); cursor: pointer;
            background: none; border: none;
            margin-bottom: 20px;
            transition: color 0.2s;
            padding: 0;
        }
        .back-btn:hover { color: var(--text); }
        .back-btn svg { transition: transform 0.2s; }
        .back-btn:hover svg { transform: translateX(-2px); }
    </style>
</head>
<body>

    <!-- Ambient orbs: Purely aesthetic background elements -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Full Screen Loader: Blocking UI element for async authentication operations -->
    <div id="loader">
        <div class="l-ring"></div>
        <span>Signing in…</span>
    </div>

    <!-- Toast Container: Dynamic notification anchor for ephemeral feedback messages -->
    <div id="toast-container"></div>

    <div class="container">

        <!-- Logo: Brand identification and visual anchor -->
        <div class="logo-wrap">
            <div class="logo-mark">B</div>
            <span class="logo-name">Tradsiee</span>
        </div>

        <!-- Card: Central container for multi-view authentication logic -->
        <div class="card">

            <!-- ── Login View ──
                 PURPOSE: Initial user identification and credential collection.
                 BINDING: Links #email and #password inputs to the login() execution scope.
            -->
            <div id="login-view" class="view active">
                <div class="heading">
                    <h2>Welcome back.</h2>
                    <p>Good to see you again.</p>
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter') login()">
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
                    <div class="forgot-row">
                        <button class="forgot-link" onclick="switchTo('forgot')">Forgot password?</button>
                    </div>
                </div>

                <button class="btn-primary" onclick="login()" id="login-btn">
                    <span>Sign In</span>
                    <div class="spinner" id="login-spinner"></div>
                </button>
            </div>

            <!-- ── Forgot Password View ──
                 PURPOSE: Recovery flow initiation via email address.
                 BINDING: Links #reset-email to handleReset() logic.
            -->
            <div id="forgot-view" class="view">
                <button class="back-btn" onclick="switchTo('login')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Back
                </button>

                <div class="heading">
                    <h2>Reset password.</h2>
                    <p>We'll send a reset link to your email.</p>
                </div>

                <div class="field">
                    <label>Email address</label>
                    <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter') handleReset()">
                </div>

                <button class="btn-primary" onclick="handleReset()" id="reset-btn">
                    <span>Send Reset Link</span>
                    <div class="spinner" id="reset-spinner"></div>
                </button>
            </div>

            <!-- ── Sent Confirmation View ──
                 PURPOSE: Final feedback state for the recovery flow.
                 BINDING: Statistically static, provides navigation back to primary login state.
            -->
            <div id="sent-view" class="view">
                <div style="text-align:center; padding: 8px 0;">
                    <div class="check-circle">
                        <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <h2 style="font-size:22px;font-weight:900;letter-spacing:-0.5px;margin-bottom:8px;">Check your inbox.</h2>
                    <p style="font-size:14px;color:var(--muted);font-weight:500;line-height:1.6;">We've sent a password reset link. It may take a minute to arrive.</p>
                </div>
                <button class="btn-ghost" onclick="switchTo('login')" style="margin-top:28px;">Back to Sign In</button>
            </div>

        </div>

        <!-- Footer: Secondary navigation for user conversion -->
        <p class="footer-link">
            New to Tradsiee? <a href="[[PATH_SIGNUP]]">Create an account</a>
        </p>

    </div>

    <script>
        // [AI_INFO] This script handles authentication flow, view management, and API orchestration.
        
        // [AI_INFO] Constants definition for environment-aware API targeting.
        const API_BASE = window.location.origin.includes('127.0.0.1') || window.location.origin.includes('localhost')
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        // ── Toast System ──
        // [AI_INFO] Utility for rendering ephemeral notifications.
        // [AI_FLOW] Input: Message string, Type enum ('error', 'success', 'info'), Duration. Output: DOM injection of toast element.
        // [AI_SIDE_EFFECT] Modifies the DOM by appending elements to #toast-container and scheduling their removal.
        function toast(message, type = 'error', duration = 4000) {
            const icons = {
                error:   '✕',
                success: '✓',
                info:    'i'
            };

            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `
                <div class="toast-icon">${icons[type]}</div>
                <span>${message}</span>
            `;

            const container = document.getElementById('toast-container');
            container.appendChild(el);

            setTimeout(() => {
                el.classList.add('toast-exit');
                setTimeout(() => el.remove(), 350);
            }, duration);
        }

        // ── View Switcher ──
        // [AI_INFO] Facilitates SPA-style transitions between logical authentication states.
        // [AI_FLOW] Input: Target view ID. Output: CSS classes update on DOM elements to trigger animations and visibility.
        // [AI_SIDE_EFFECT] Modifies classes of .view elements; relies on setTimeout for animation timing coordination.
        function switchTo(view) {
            const views = ['login', 'forgot', 'sent'];
            const activeEl = document.querySelector('.view.active');

            if (activeEl) {
                activeEl.classList.add('view-exit');
                setTimeout(() => {
                    activeEl.classList.remove('active', 'view-exit');
                    const next = document.getElementById(`${view}-view`);
                    next.classList.add('active', 'view-enter');
                    setTimeout(() => next.classList.remove('view-enter'), 400);
                }, 240);
            }
        }

        // ── Login ──
        // [AI_INFO] Primary authentication handler orchestrating credential validation and session establishment.
        // [AI_FLOW] Input: User-provided credentials from DOM. Output: LocalStorage persistence of session data and window redirection.
        // [AI_SIDE_EFFECT] API call to /login, modifications to localStorage, manipulation of #loader and button states.
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');

            if (!email || !password) {
                toast('Please enter your email and password.', 'error');
                if (!email) document.getElementById('email').classList.add('error');
                if (!password) document.getElementById('password').classList.add('error');
                return;
            }

            // Clear error states
            ['email', 'password'].forEach(id => document.getElementById(id).classList.remove('error'));

            // Show loader
            document.getElementById('loader').style.display = 'flex';
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('tradsiee_slug', data.slug);
                    localStorage.setItem('tradsiee_token', data.access_token);
                    toast('Signed in successfully!', 'success', 1500);
                    setTimeout(() => { window.location.href = '[[PATH_PORTAL]]'; }, 900);
                } else {
                    document.getElementById('loader').style.display = 'none';
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    toast(data.detail || 'Incorrect email or password.', 'error');
                    document.getElementById('password').classList.add('error');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }

            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                btn.disabled = false;
                spinner.style.display = 'none';
                toast('Connection lost. Check your internet and try again.', 'error');
            }
        }

        // ── Reset Password ──
        // [AI_INFO] Initiates the backend password recovery process.
        // [AI_FLOW] Input: Recovery email from DOM. Output: UI transition to confirmation state on success.
        // [AI_SIDE_EFFECT] API call to /forgot-password, UI state modifications (spinners, buttons, view switching).
        async function handleReset() {
            const email = document.getElementById('reset-email').value.trim();
            const btn = document.getElementById('reset-btn');
            const spinner = document.getElementById('reset-spinner');

            if (!email) {
                toast('Please enter your email address.', 'error');
                document.getElementById('reset-email').classList.add('error');
                return;
            }

            document.getElementById('reset-email').classList.remove('error');
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                btn.disabled = false;
                spinner.style.display = 'none';

                if (res.ok) {
                    switchTo('sent');
                } else {
                    toast("We couldn't find an account with that email.", 'error');
                    document.getElementById('reset-email').classList.add('error');
                }

            } catch (err) {
                btn.disabled = false;
                spinner.style.display = 'none';
                toast('Connection error. Please try again.', 'error');
            }
        }

        // ── Clear error state on input ──
        // [AI_INFO] Event listener orchestration for real-time validation feedback clearing.
        // [AI_SIDE_EFFECT] Removes 'error' class from input elements upon user interaction.
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => input.classList.remove('error'));
        });
    </script>
</body>
</html>
