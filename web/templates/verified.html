<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verified | Tradsiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --blue: #007AFF;
            --blue-light: rgba(0,122,255,0.08);
            --text: #1C1C1E;
            --muted: #8E8E93;
            --border: rgba(0,0,0,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px; -webkit-font-smoothing: antialiased;
            overflow: hidden; position: relative;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,122,255,0.1) 0%, transparent 70%); top: -100px; right: -50px; }
        .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(52,199,89,0.08) 0%, transparent 70%); bottom: -80px; left: -50px; }
        
        .card {
            background: var(--card); border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
            padding: 48px 40px; width: 100%; max-width: 400px;
            text-align: center; position: relative; z-index: 10;
            animation: cardRise 0.6s cubic-bezier(0.2,0,0,1) forwards;
        }
        @keyframes cardRise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .success-icon {
            width: 80px; height: 80px; background: var(--blue-light);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; color: var(--blue);
        }
        h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px; }
        p { font-size: 15px; color: var(--muted); font-weight: 500; line-height: 1.6; margin-bottom: 32px; }
        
        .btn-primary {
            width: 100%; padding: 16px; border-radius: 18px; border: none; background: #000; color: #fff;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background: #1C1C1E; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="success-icon">
            <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1>Account Verified</h1>
        <p>Your identity has been confirmed. You can now access your workspace and start receiving leads.</p>
        <button class="btn-primary" onclick="window.location.href = '[[PATH_LOGIN]]'">Go to Login</button>
    </div>
</body>
</html>
