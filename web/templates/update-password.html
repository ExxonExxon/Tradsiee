<!-- 
[PASSWORD_RECOVERY_SYSTEM_SPECIFICATION]
This file implements the secure password rotation interface for the Tradsiee platform.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | Tradsiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --blue: #007AFF;
            --blue-light: rgba(0,122,255,0.08);
            --text: #1C1C1E;
            --muted: #8E8E93;
            --border: rgba(0,0,0,0.07);
            --red: #FF3B30;
            --green: #34C759;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px; -webkit-font-smoothing: antialiased;
            overflow-x: hidden; position: relative;
        }

        /* [VISUAL_EFFECTS] */
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,122,255,0.1) 0%, transparent 70%); top: -150px; right: -100px; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(52,199,89,0.08) 0%, transparent 70%); bottom: -100px; left: -80px; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; }

        .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
        .logo-mark { width: 40px; height: 40px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .logo-name { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }

        .card { background: var(--card); border-radius: 32px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.06); padding: 40px; animation: cardRise 0.6s cubic-bezier(0.2,0,0,1) forwards; }
        @keyframes cardRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .heading { margin-bottom: 28px; text-align: center; }
        .heading h2 { font-size: 28px; font-weight: 900; letter-spacing: -0.7px; line-height: 1.2; }
        .heading p { font-size: 14px; font-weight: 500; color: var(--muted); margin-top: 6px; }

        .field { position: relative; margin-bottom: 24px; }
        .field label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
        .field input { width: 100%; padding: 15px 18px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); outline: none; transition: all 0.2s; }
        .field input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        .field input.error { border-color: var(--red); box-shadow: 0 0 0 4px rgba(255,59,48,0.1); }

        .pass-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted); display: flex; align-items: center; z-index: 10; transition: color 0.2s; }
        .toggle-password:hover { color: var(--text); }
        .toggle-password svg { width: 20px; height: 20px; stroke-width: 2.2; }

        /* [UI_COMPONENT: PASSWORD_STRENGTH_ANALYZER] */
        .strength-wrap { margin-top: 10px; }
        .strength-meter { height: 4px; background: var(--bg); border-radius: 99px; overflow: hidden; display: flex; gap: 4px; }
        .strength-segment { height: 100%; flex: 1; transition: background 0.3s ease; background: transparent; border-radius: 99px; }
        .strength-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; color: var(--muted); }
        .s-weak .strength-segment:nth-child(1) { background: var(--red); }
        .s-fair .strength-segment:nth-child(1), .s-fair .strength-segment:nth-child(2) { background: #FF9500; }
        .s-good .strength-segment:nth-child(1), .s-good .strength-segment:nth-child(2), .s-good .strength-segment:nth-child(3) { background: var(--blue); }
        .s-strong .strength-segment { background: var(--green); }

        .btn-primary { width: 100%; padding: 16px; border-radius: 18px; border: none; background: #000; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary:hover { background: #1C1C1E; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

        #loader { display: none; position: fixed; inset: 0; background: rgba(242,242,247,0.85); backdrop-filter: blur(12px); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .l-ring { width: 40px; height: 40px; border: 3px solid rgba(0,0,0,0.08); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* [UI_COMPONENT: NOTIFICATION_SYSTEM] */
        #toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 20px; background: #1C1C1E; color: #fff; font-size: 13px; font-weight: 600; box-shadow: 0 16px 48px rgba(0,0,0,0.2); pointer-events: auto; animation: toastIn 0.4s cubic-bezier(0.2,0,0,1) forwards; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .toast.error { border-left: 4px solid var(--red); }
        .toast.success { border-left: 4px solid var(--green); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div id="loader">
        <div class="l-ring"></div>
        <span style="font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;">Updating Password</span>
    </div>

    <div id="toast-container"></div>

    <div class="container">
        <div class="logo-wrap">
            <div class="logo-mark">B</div>
            <span class="logo-name">Tradsiee</span>
        </div>

        <div class="card">
            <div class="heading">
                <h2>Secure Your Account</h2>
                <p>Create a new password to regain access to your workspace.</p>
            </div>

            <div class="field">
                <label>New Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
                    <div class="toggle-password" onclick="togglePass('password', 'eye-icon')">
                        <svg id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M2.458 12C3.732 7.943 7.523 5 12 5c3.79 0 7.14 2.276 8.542 5.458a2.5 2.5 0 010 2.084C19.14 15.724 15.79 18 12 18c-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </div>
                </div>
                <div class="strength-wrap" id="strength-root">
                    <div class="strength-meter">
                        <div class="strength-segment"></div>
                        <div class="strength-segment"></div>
                        <div class="strength-segment"></div>
                        <div class="strength-segment"></div>
                    </div>
                    <div class="strength-label" id="strength-label">Choose a secure password</div>
                </div>
            </div>

            <div class="field">
                <label>Confirm Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password">
                    <div class="toggle-password" onclick="togglePass('confirm-password', 'eye-icon-confirm')">
                        <svg id="eye-icon-confirm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M2.458 12C3.732 7.943 7.523 5 12 5c3.79 0 7.14 2.276 8.542 5.458a2.5 2.5 0 010 2.084C19.14 15.724 15.79 18 12 18c-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </div>
                </div>
            </div>

            <button class="btn-primary" onclick="updatePassword()" id="update-btn">
                <span>Update Password</span>
            </button>
        </div>
        
        <p style="text-align:center; margin-top:24px; font-size:13px; color:var(--muted);">
            Remembered your password? <a href="[[PATH_LOGIN]]" style="color:var(--blue); font-weight:700;">Sign in</a>
        </p>
    </div>

    <script src="/config.js"></script>
    <script>
        const API_BASE = TRADSIEE_ENV.API_BASE;

        // [INIT: SESSION_VALIDATION]
        // Ensures the presence of a recovery token before permitting interaction.
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.hash.substring(1));
            if (!params.get('access_token')) {
                toast("Invalid or expired recovery link. Redirecting...", "error");
                setTimeout(() => { window.location.href = "[[PATH_LOGIN]]"; }, 3000);
            }
        });

        function toast(m, type = 'error') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            const icon = type === 'success' 
                ? '<svg width="18" height="18" fill="none" stroke="var(--green)" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>'
                : '<svg width="18" height="18" fill="none" stroke="var(--red)" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';
            t.innerHTML = `${icon}<span>${m}</span>`;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; setTimeout(() => t.remove(), 400); }, 4000);
        }

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268-2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c3.79 0 7.14 2.276 8.542 5.458a2.5 2.5 0 010 2.084C19.14 15.724 15.79 18 12 18c-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        function checkStrength(p) {
            const root = document.getElementById('strength-root');
            const label = document.getElementById('strength-label');
            if (!p) { root.className = 'strength-wrap'; label.textContent = 'Choose a secure password'; return; }
            let score = 0;
            const hasUpper = /[A-Z]/.test(p);
            const hasLower = /[a-z]/.test(p);
            const hasNumber = /[0-9]/.test(p);
            const hasSymbol = /[^A-Za-z0-9]/.test(p);
            const variety = [hasUpper, hasLower, hasNumber, hasSymbol].filter(Boolean).length;
            if (p.length >= 8) score++;
            if (p.length >= 12) score++;
            if (variety >= 2) score++;
            if (variety >= 3) score++;
            if (variety >= 4) score++;
            
            const isSequential = /12345|abcdef|qwertyuiop/.test(p.toLowerCase());
            const isRepeating = /(.)\1{3,}/.test(p);
            if (isSequential || isRepeating) score = Math.max(1, score - 1);

            if (score <= 1) { root.className = 'strength-wrap s-weak'; label.textContent = 'Weak - Use a mix of characters'; }
            else if (score === 2) { root.className = 'strength-wrap s-fair'; label.textContent = 'Fair - Add symbols or numbers'; }
            else if (score === 3) { root.className = 'strength-wrap s-good'; label.textContent = 'Good Password'; }
            else { root.className = 'strength-wrap s-strong'; label.textContent = 'Excellent Strength'; }
        }

        async function updatePassword() {
            const passEl = document.getElementById('password');
            const confirmEl = document.getElementById('confirm-password');
            const pwd = passEl.value;
            const confirmPwd = confirmEl.value;

            passEl.classList.remove('error');
            confirmEl.classList.remove('error');

            if (pwd.length < 8) { toast("Password too short"); passEl.classList.add('error'); return; }
            if (pwd !== confirmPwd) { toast("Passwords do not match"); confirmEl.classList.add('error'); return; }

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const params = new URLSearchParams(window.location.hash.substring(1));
                const token = params.get('access_token');
                if (!token) { toast("Invalid or expired link"); window.location.href = "[[PATH_LOGIN]]"; return; }

                const res = await fetch(`${API_BASE}/update-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ new_password: pwd })
                });

                if (res.ok) {
                    toast("Success! Password updated", "success");
                    setTimeout(() => { window.location.href = "[[PATH_LOGIN]]"; }, 2000);
                } else {
                    const data = await res.json();
                    toast(data.detail || "Update failed");
                    loader.style.display = 'none';
                    passEl.classList.add('error');
                }
            } catch (err) {
                loader.style.display = 'none';
                toast("Connection error");
            }
        }
    </script>
</body>
</html>
